<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6a1b9a" />
  <title>વિજય ફ્લાવર સેન્ટર</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ============ LOGIN VIEW ============ -->
  <section id="login-view" class="login-view">
    <div class="login-card">
      <div class="login-logo">🌸</div>
      <h1>વિજય ફ્લાવર સેન્ટર</h1>
      <p class="login-sub">ઓર્ડર મેનેજમેન્ટ સિસ્ટમ</p>
      <div id="login-content"><!-- staff list / PIN pad injected here --></div>
      <p id="login-error" class="error-text"></p>
    </div>
  </section>

  <!-- ============ APP SHELL ============ -->
  <div id="app-shell" class="app-shell hidden">
    <header class="app-header">
      <span class="app-title">🌸 વિજય ફ્લાવર સેન્ટર</span>
      <span class="app-user" id="header-user"></span>
    </header>

    <main id="view-container" class="view-container"><!-- views injected here --></main>

    <nav class="bottom-nav">
      <button class="nav-btn" data-route="queue">
        <span class="nav-ic">📋</span><span>ઓર્ડર</span>
      </button>
      <button class="nav-btn" data-route="pending">
        <span class="nav-ic">💰</span><span>બાકી બિલ</span>
      </button>
      <button class="nav-btn nav-fab" data-route="new">
        <span class="nav-ic">➕</span><span>નવો</span>
      </button>
      <button class="nav-btn" data-route="items">
        <span class="nav-ic">🌹</span><span>વસ્તુઓ</span>
      </button>
      <button class="nav-btn" data-route="reports">
        <span class="nav-ic">📈</span><span>રિપોર્ટ</span>
      </button>
    </nav>
  </div>

  <!-- toast + modal mounts -->
  <div id="toast" class="toast hidden"></div>
  <div id="modal-root"></div>

  <!-- Supabase JS for realtime -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- App modules -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
