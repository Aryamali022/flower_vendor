services:
  - type: web
    name: flower-vendor-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render generates a long random secret
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: ALGORITHM
        value: HS256
      - key: SUPABASE_URL
        sync: false                # set in the Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false                # set in the Render dashboard (secret)
      - key: CORS_ORIGINS
        sync: false                # set to your Vercel URL after the frontend deploys
