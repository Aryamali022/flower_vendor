# Render Blueprint — deploy the FastAPI backend.
# In the Render dashboard: New + -> Blueprint -> point at this repo.
services:
  - type: web
    name: flower-shop-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: SUPABASE_URL
        sync: false          # set in dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false          # set in dashboard (secret)
      - key: CORS_ORIGINS
        sync: false          # e.g. https://your-app.netlify.app
